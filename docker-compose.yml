# Local test database for the outbox library.
#
# The postgres image runs anything in /docker-entrypoint-initdb.d/ on first
# init, so we mount each .up.sql file there directly. We do NOT mount the
# whole migrations/ dir there — it also contains .down.sql files which
# would undo the schema.
#
# When we add a second migration, add a new volume line here until the
# library ships its own migration runner.
#
# Port 5434 (instead of 5432) so this does not collide with a default
# Postgres or with other compose stacks already running on the host.
services:
  postgres:
    image: postgres:18-alpine
    command: postgres -c fsync=off -c synchronous_commit=off -c full_page_writes=off
    environment:
      POSTGRES_USER: outbox
      POSTGRES_PASSWORD: outbox
      POSTGRES_DB: outbox
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      # Postgres 18+ wants the mount at /var/lib/postgresql (parent), not the
      # /var/lib/postgresql/data subdirectory — see https://github.com/docker-library/postgres/pull/1259
      - pgdata:/var/lib/postgresql
      - ./migrations/20260616120000_initial.up.sql:/docker-entrypoint-initdb.d/01_initial.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "outbox", "-d", "outbox"]
      interval: 1s
      timeout: 1s
      retries: 10

volumes:
  pgdata:
